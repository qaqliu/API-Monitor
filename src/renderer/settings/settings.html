<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <div id="settings">
    <div class="header">
      <span id="header-title">Settings</span>
      <button id="btn-close" title="Close">&times;</button>
    </div>
    <div class="body">
      <div class="sidebar">
        <button class="cat-btn active" data-cat="general" id="cat-general">General</button>
        <button class="cat-btn" data-cat="monitor" id="cat-monitor">Monitor</button>
        <button class="cat-btn" data-cat="providers" id="cat-providers">Providers</button>
      </div>
      <div class="content">
        <!-- General panel -->
        <div class="panel active" id="panel-general">
          <div class="section">
            <label id="lbl-language">Language</label>
            <select id="language-select">
              <option value="en">English</option>
              <option value="zh-CN">简体中文</option>
            </select>
            <p class="hint" id="lang-hint">Language change takes effect after restart.</p>
          </div>
          <div class="section">
            <label class="settings-check-row">
              <input type="checkbox" id="entry-list-enabled">
              <span id="lbl-entry-list-enabled">Enable entry selector list</span>
            </label>
            <p class="hint" id="entry-list-hint">When disabled, the widget uses the compact original window size and the logo is not clickable.</p>
          </div>
          <div class="section">
            <label id="lbl-updates">Updates</label>
            <div class="update-panel">
              <div class="update-row">
                <span id="lbl-current-version">Current Version</span>
                <span id="current-version">--</span>
              </div>
              <div class="update-status" id="update-status">Ready to check for updates.</div>
              <div class="update-actions">
                <button id="btn-check-update">Check for Updates</button>
                <button id="btn-download-update" class="hidden">Download</button>
                <button id="btn-install-update" class="primary hidden">Restart</button>
              </div>
            </div>
          </div>
        </div>
        <!-- Monitor panel -->
        <div class="panel" id="panel-monitor">
          <div class="section">
            <label id="lbl-entries">Monitor Entries</label>
            <div id="entry-list"></div>
            <button id="btn-add" class="btn-add">+ Add Entry</button>
          </div>
          <div class="section">
            <label for="refresh-interval" id="lbl-defresh">Default Auto-refresh</label>
            <select id="refresh-interval">
              <option value="1" id="opt-r1">1 minute</option>
              <option value="5" id="opt-r5" selected>5 minutes</option>
              <option value="10" id="opt-r10">10 minutes</option>
              <option value="15" id="opt-r15">15 minutes</option>
              <option value="30" id="opt-r30">30 minutes</option>
              <option value="60" id="opt-r60">60 minutes</option>
            </select>
          </div>
        </div>
        <div class="panel" id="panel-providers">
          <div class="section">
            <label id="lbl-custom-providers">Custom Providers</label>
            <div id="custom-provider-list"></div>
            <button id="btn-add-provider" class="btn-add">+ Add Provider</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal overlay -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <span id="modal-title">Add Entry</span>
        <button id="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label for="entry-name" id="lbl-name">Name</label>
          <input type="text" id="entry-name" placeholder="e.g. My Account" autocomplete="off">
        </div>
        <div class="field">
          <label for="entry-provider" id="lbl-provider">Provider</label>
          <div class="provider-combo">
            <input type="text" id="entry-provider-search" class="provider-search" placeholder="Search provider..." autocomplete="off">
            <div id="entry-provider-options" class="provider-options hidden"></div>
          </div>
          <select id="entry-provider" class="hidden-native-select">
            <option value="deepseek">DeepSeek</option>
            <option value="codex">Codex (ChatGPT)</option>
          </select>
        </div>
        <div class="field checkbox-field hidden" id="deepseek-simple-field">
          <label>
            <input type="checkbox" id="entry-simple-mode">
            <span id="lbl-simple-mode">Compact mode</span>
          </label>
        </div>
        <div class="field">
          <label for="entry-key" id="lbl-apikey">API Key</label>
          <div class="input-row">
            <input type="password" id="entry-key" placeholder="sk-..." autocomplete="off">
            <button id="btn-toggle-key" title="Show/Hide">
              <svg class="eye-slash" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
              <svg class="eye" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
            <button id="btn-browse-key" title="Browse" style="display:none">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 17l3-11h16l3 11H1zm10-5v3m-3-3h6"/>
                <rect x="3" y="17" width="18" height="4" rx="1"/>
              </svg>
            </button>
          </div>
          <span class="field-hint" id="key-hint" style="display:none"></span>
        </div>
        <div class="field">
          <label for="entry-interval" id="lbl-interval">Refresh Interval</label>
          <select id="entry-interval">
            <option value="-1" id="opt-def">Use default</option>
            <option value="1">1 minute</option>
            <option value="5">5 minutes</option>
            <option value="10">10 minutes</option>
            <option value="15">15 minutes</option>
            <option value="30">30 minutes</option>
            <option value="60">60 minutes</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button id="modal-cancel">Cancel</button>
        <button id="modal-save" class="primary">Save</button>
      </div>
    </div>
  </div>

  <div id="provider-modal-overlay" class="modal-overlay hidden">
    <div class="modal provider-modal">
      <div class="modal-header">
        <span id="provider-modal-title">Add Provider</span>
        <button id="provider-modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label id="lbl-provider-logo">Logo</label>
          <div class="logo-editor">
            <div id="logo-preview" class="logo-preview"></div>
            <div class="logo-controls">
              <button id="btn-choose-logo">Choose Image</button>
              <p class="field-hint" id="logo-crop-hint">Choose an image and crop a square logo.</p>
            </div>
          </div>
        </div>
        <div class="field">
          <label for="custom-provider-name" id="lbl-custom-provider-name">Provider Name</label>
          <input id="custom-provider-name" type="text" autocomplete="off">
        </div>
        <div class="field">
          <label for="custom-provider-base" id="lbl-custom-provider-base">Base URL</label>
          <input id="custom-provider-base" type="text" placeholder="https://api.example.com/v1" autocomplete="off">
        </div>
        <div class="field">
          <label id="lbl-monitor-blocks">Monitor Blocks</label>
          <div id="monitor-block-list"></div>
          <div class="monitor-actions">
            <button id="btn-add-balance-monitor">+ Balance</button>
            <button id="btn-add-dashboard-monitor">+ Dashboard</button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="provider-modal-cancel">Cancel</button>
        <button id="provider-modal-save" class="primary">Save</button>
      </div>
    </div>
  </div>

  <div id="logo-crop-modal-overlay" class="modal-overlay hidden">
    <div class="modal logo-crop-modal">
      <div class="modal-header">
        <span id="logo-crop-title">Crop Logo</span>
        <button id="logo-crop-close">&times;</button>
      </div>
      <div class="modal-body">
        <div id="logo-crop-stage" class="logo-crop-stage">
          <img id="logo-crop-image" alt="">
          <div id="logo-crop-box" class="logo-crop-box">
            <span class="crop-handle nw"></span>
            <span class="crop-handle ne"></span>
            <span class="crop-handle sw"></span>
            <span class="crop-handle se"></span>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="logo-crop-cancel">Cancel</button>
        <button id="logo-crop-apply" class="primary">Apply</button>
      </div>
    </div>
  </div>

  <script src="settings.js"></script>
</body>
</html>
